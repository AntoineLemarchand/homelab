apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "39.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  timeout: 15m
  values:
    ingressRoute:
      dashboard:
        enabled: true
    service:
      type: NodePort
    metrics:
      prometheus:
        entryPoint: metrics
      ports:
        metrics:
          port: 9100
          expose:
            default: false
          exposedPort: 9100
      logs:
        access:
          enabled: true
