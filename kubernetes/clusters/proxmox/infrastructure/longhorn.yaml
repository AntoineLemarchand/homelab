apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/part-of: longhorn
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.11.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  timeout: 15m
  values:
    defaultSettings:
      defaultReplicaCount: 2
      storageOverProvisioningPercentage: 200
      storageMinimalAvailablePercentage: 15
      autoSalvage: true
      createDefaultDiskLabeledNodes: false
      defaultDataPath: /var/lib/longhorn/
      # Backup target configuration (S3 example)
      # backupTarget: s3://longhorn-backups@us-east-1/
      # backupTargetCredentialSecret: longhorn-s3-secret
      # Guaranteed engine manager CPU allocation
      guaranteedInstanceManagerCPU: 12
      nodeDrainPolicy: block-if-contains-last-replica
    persistence:
      defaultClass: true
      defaultFsType: ext4
      defaultClassReplicaCount: 3
      reclaimPolicy: Delete
    longhornUI:
      replicas: 1
    ingress:
      enabled: false
    longhornManager:
      tolerations: []
      nodeSelector: {}
    longhornDriver:
      tolerations: []
      nodeSelector: {}
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-retain
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
parameters:
  numberOfReplicas: "2"
  dataLocality: "best-effort"
  fsType: "ext4"
  recurringJobSelector: '[{"name": "daily-snapshot", "isGroup": false}]'
provisioner: driver.longhorn.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshot
  namespace: longhorn-system
spec:
  cron: "0 0 * * *"
  task: snapshot
  groups: []
  retain: 7
  concurrency: 2
  labels:
    type: daily
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backup
  namespace: longhorn-system
spec:
  cron: "0 2 * * 0"
  task: backup
  groups: []
  retain: 4
  concurrency: 1
  labels:
    type: weekly
