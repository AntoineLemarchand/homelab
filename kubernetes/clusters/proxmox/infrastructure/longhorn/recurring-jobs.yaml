apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: daily-snapshot
  namespace: longhorn-system
spec:
  cron: "0 0 * * *"
  task: snapshot
  groups: []
  retain: 7
  concurrency: 2
  labels:
    type: daily
---
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backup
  namespace: longhorn-system
spec:
  cron: "0 2 * * 0"
  task: backup
  groups: []
  retain: 4
  concurrency: 1
  labels:
    type: weekly

