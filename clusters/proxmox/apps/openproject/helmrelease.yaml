apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openproject
  namespace: openproject
spec:
  interval: 1h0m0s
  url: https://charts.openproject.org
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openproject
  namespace: openproject
spec:
  chart:
    spec:
      chart: openproject
      sourceRef:
        kind: HelmRepository
        name: openproject
  interval: 1h0m0s
  values:
    persistence:
      enabled: true
      storageClass: longhorn
