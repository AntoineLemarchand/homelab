apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: kitchenowl-chart
  namespace: kitchenowl
spec:
  interval: 1h
  url: https://github.com/kehralexander/kitchenowl-chart
  ref:
    branch: master
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kitchenowl
  namespace: kitchenowl
spec:
  chart:
    spec:
      chart: ./kitchenowl
      sourceRef:
        kind: GitRepository
        name: kitchenowl-chart
        namespace: kitchenowl
  interval: 1h0m0s
  valuesFrom:
    - kind: ConfigMap
      name: kitchenowl-values
